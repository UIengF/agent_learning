<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent 资料助手</title>
  <link rel="stylesheet" href="/static/styles.css?v=nexus-static-20260419">
</head>
<body>
  <main class="app-shell">
    <button id="mobile-sidebar-toggle" class="mobile-fab" type="button" aria-label="切换侧边栏">
      <span class="fab-open">☰</span>
      <span class="fab-close">×</span>
    </button>

    <aside id="question-pane" class="question-pane" aria-labelledby="app-title">
      <div class="question-header">
        <div class="brand-mark">
          <span class="brand-icon">✦</span>
          <span class="brand-label">Nexus Hub</span>
        </div>
        <p class="eyebrow">Agent Research</p>
        <h1 id="app-title">Agent 资料助手</h1>
        <p class="intro">围绕本地 Agent 资料提问，必要时自动补充网页和论文线索。</p>
      </div>

      <form id="ask-form" class="ask-form">
        <section class="form-section">
          <div class="section-badge">Research Engine Alpha</div>
          <label for="question" class="field-label">Primary Query</label>
          <textarea
            id="question"
            name="question"
            rows="9"
            required
            placeholder="例如：这些资料里对 Agent 工程化有哪些共识？"
          ></textarea>
        </section>

        <section class="form-section field-stack">
          <div class="field">
            <label for="index-dir" class="field-label">Metadata Index</label>
            <input id="index-dir" name="index_dir" value="agent" autocomplete="off">
          </div>

          <div class="field">
            <label for="session-id" class="field-label">Workspace Context</label>
            <input id="session-id" name="session_id" value="graph_rag_default" autocomplete="off">
          </div>
        </section>

        <label class="resume-row">
          <input id="resume" name="resume" type="checkbox">
          <span class="resume-control" aria-hidden="true"></span>
          <span class="resume-text">Context continuation</span>
        </label>

        <div class="form-footer">
          <button id="submit-button" class="submit-button" type="submit">开始回答</button>
        </div>
      </form>
    </aside>

    <section class="answer-pane" aria-live="polite">
      <header class="workspace-header">
        <div class="workspace-left">
          <button id="desktop-sidebar-toggle" class="ghost-icon hidden" type="button" aria-label="展开侧边栏">›</button>
          <div class="workspace-status">
            <span id="status-indicator" class="status-indicator"></span>
            <div class="status-copy">
              <p class="eyebrow">Workspace</p>
              <p id="status-text">准备就绪</p>
            </div>
          </div>
        </div>

        <div class="workspace-actions">
          <button id="clear-button" class="ghost-action" type="button">清空</button>
          <button class="ghost-icon" type="button" aria-label="设置">⚙</button>
        </div>
      </header>

      <div class="workspace-feed">
        <div id="history" class="history">
          <article class="empty-state">
            <div class="empty-icon">⌕</div>
            <h2>先提一个问题</h2>
            <p>回答会显示在这里，并保留本页最近几轮记录。</p>
          </article>
        </div>
      </div>

      <div class="ambient-glow" aria-hidden="true"></div>
    </section>
  </main>

  <script src="/static/app.js?v=nexus-static-20260419"></script>
</body>
</html>
