services:
  searxng:
    image: searxng/searxng:latest
    container_name: agent-rag-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-agent-rag-local-only-change-me}
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
